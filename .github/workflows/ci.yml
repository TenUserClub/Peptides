name: Quality checks

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json
            sites/doctors/package-lock.json
            sites/content/package-lock.json
            sites/news/package-lock.json
            sites/updates/package-lock.json
      - run: npm ci
      - run: npm ci --prefix site
      - run: npm ci --prefix sites/doctors
      - run: npm ci --prefix sites/content
      - run: npm ci --prefix sites/news
      - run: npm ci --prefix sites/updates
      - run: npm audit --audit-level=high
      - run: npm audit --audit-level=high --prefix site
      - run: npm audit --audit-level=high --prefix sites/doctors
      - run: npm audit --audit-level=high --prefix sites/content
      - run: npm audit --audit-level=high --prefix sites/news
      - run: npm audit --audit-level=high --prefix sites/updates
      - run: npm run check
